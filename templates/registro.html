{% extends "base.html" %}

{% block title %}Registro - Copa Renault{% endblock %}

{% block body %}
  <h1>Registrate</h1>
  <h3>Crea tu cuenta para participar</h3>

  <form method="post">
    <label>
      Usuario
      <input type="text" name="usuario" placeholder="Usuario" required>
    </label>
    <label>
      Contrasena
      <input type="password" name="password" placeholder="Contrasena" required>
    </label>
    <button type="submit">Registrarse</button>
  </form>
{% endblock %}
