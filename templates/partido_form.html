{% extends "base.html" %}

{% block title %}{{ accion }} partido - Copa Renault{% endblock %}

{% block body %}
  <section class="window-page">
    <div class="browser-window">
      <div class="window-bar">
        <span class="window-dot">x</span>
        <span class="window-dot">+</span>
        <span class="window-dot">-</span>
      </div>

      <form class="auth-card form-stack" method="post">
        <span class="trophy" aria-hidden="true"></span>
        <h1>{{ accion }} partido</h1>

        <label>
          Equipo 1
          <input type="text" name="equipo1" value="{{ partido.equipo1 if partido else '' }}" required>
        </label>

        <label>
          Equipo 2
          <input type="text" name="equipo2" value="{{ partido.equipo2 if partido else '' }}" required>
        </label>

        <label>
          Deporte
          <select name="deporte" required>
            {% set deporte_actual = partido.deporte if partido else 'Futbol' %}
            <option value="Futbol" {% if deporte_actual == 'Futbol' %}selected{% endif %}>Futbol</option>
            <option value="Basquet" {% if deporte_actual == 'Basquet' %}selected{% endif %}>Basquet</option>
            <option value="Voley" {% if deporte_actual == 'Voley' %}selected{% endif %}>Voley</option>
          </select>
        </label>

        <label>
          Rama
          <select name="rama" required>
            {% set rama_actual = partido.rama if partido else 'Masculino' %}
            <option value="Masculino" {% if rama_actual == 'Masculino' %}selected{% endif %}>Masculino</option>
            <option value="Femenino" {% if rama_actual == 'Femenino' %}selected{% endif %}>Femenino</option>
          </select>
        </label>

        <label>
          Horario
          <input type="time" name="horario" value="{{ partido.horario if partido else '' }}" required>
        </label>

        {% if partido %}
          <label>
            Goles equipo 1
            <input type="number" name="goles_equipo1" min="0" value="{{ partido.goles_equipo1 if partido.goles_equipo1 is not none else '' }}">
          </label>

          <label>
            Goles equipo 2
            <input type="number" name="goles_equipo2" min="0" value="{{ partido.goles_equipo2 if partido.goles_equipo2 is not none else '' }}">
          </label>
        {% endif %}

        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn" href="{{ url_for('fixture') }}">Cancelar</a>
      </form>
    </div>
  </section>
{% endblock %}
